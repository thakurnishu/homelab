apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nginx-gateway-public-nishantlabs-cloud
spec:
  secretName: nginx-gateway-public-nishantlabs-cloud-tls
  dnsNames:
    - 'nishantlabs.cloud'
    - '*.nishantlabs.cloud'
  issuerRef:
    name: cloudflare-clusterissue
    kind: ClusterIssuer
