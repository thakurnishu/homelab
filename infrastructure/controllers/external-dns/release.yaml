apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
spec:
  interval: 5m
  releaseName: external-dns

  chart:
    spec:
      chart: external-dns
      version: '1.19.0'
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: external-dns

  values:
    sources:
#      - service
#      - ingress
      - gateway-httproute # enabled when gateway api crds are installed in cluster
#      - gateway-tlsroute # enabled when gateway api crds are installed in cluster
    provider:
      name: pihole
    policy: upsert-only
    registry: noop
    domainFilters:
      - nishantlabs.cloud
    env: 
      - name: EXTERNAL_DNS_PIHOLE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: pihole-info-vault
            key: pihole-password
      - name: EXTERNAL_DNS_PIHOLE_SERVER
        valueFrom:
          secretKeyRef:
            name: pihole-info-vault
            key: pihole-server
      - name: EXTERNAL_DNS_PIHOLE_API_VERSION
        valueFrom:
          secretKeyRef:
            name: pihole-info-vault
            key: pihole-api-version
#    extraArgs:
#      - --pihole-tls-skip-verify
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
    logLevel: debug
