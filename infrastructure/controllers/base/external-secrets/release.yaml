apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
spec:
  interval: 5m
  releaseName: external-secrets

  chart:
    spec:
      chart: external-secrets
      version: '2.1.*'
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: external-secrets

  values:
    installCRDs: true
