apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx-gateway
spec:
  interval: 5m
  releaseName: nginx-gateway
  dependsOn:
    - name: metallb
  chart:
    spec:
      chart: nginx-gateway-fabric
      version: '2.4.2'
      sourceRef:
        kind: HelmRepository
        name: nginx-gateway
        namespace: nginx-gateway
  values:
    nginx:
      service:
        externalTrafficPolicy: Cluster
        type: LoadBalancer
