apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
spec:
  interval: 5m
  releaseName: external-dns

  chart:
    spec:
      chart: external-dns
      version: '1.19.0'
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: external-dns

  values:
    sources:
#      - service
#      - ingress
      - gateway-httproute # enabled when gateway api crds are installed in cluster
#      - gateway-tlsroute # enabled when gateway api crds are installed in cluster
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
    logLevel: debug
