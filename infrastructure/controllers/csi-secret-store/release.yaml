apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-secret-store
spec:
  interval: 5m
  releaseName: csi-secret-store

  chart:
    spec:
      chart: secrets-store-csi-driver
      version: '1.5.*'
      sourceRef:
        kind: HelmRepository
        name: csi-secret-store
        namespace: csi-secret-store

  values:
    enableSecretRotation: true
    syncSecret:
      enabled: true
