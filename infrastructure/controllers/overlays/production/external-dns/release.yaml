apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
spec:
  values:
    provider:
      name: pihole
    policy: upsert-only
    registry: noop
    domainFilters:
      - nishantlabs.cloud
    env: 
      - name: EXTERNAL_DNS_PIHOLE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: pihole-info-vault
            key: pihole-password
      - name: EXTERNAL_DNS_PIHOLE_SERVER
        valueFrom:
          secretKeyRef:
            name: pihole-info-vault
            key: pihole-server
      - name: EXTERNAL_DNS_PIHOLE_API_VERSION
        valueFrom:
          secretKeyRef:
            name: pihole-info-vault
            key: pihole-api-version
#    extraArgs:
#      - --pihole-tls-skip-verify
