apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hashicorp-vault
spec:
  interval: 5m
  releaseName: hashicorp-vault

  chart:
    spec:
      chart: vault
      version: '0.32.*'
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: hashicorp-vault

  values:
    server:
      dev:
        enabled: true
        devRootToken: "root"

