apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hashicorp-vault
spec:
  interval: 5m
  timeout: 60m
  releaseName: hashicorp-vault

  chart:
    spec:
      chart: vault
      version: '0.32.*'
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: hashicorp-vault

  values:
    csi:
      enabled: false
    server:
      dataStorage:
        enabled: true
        size: 1Gi
      auditStorage:
        enabled: true
        size: 1Gi
      ui:
        enabled: true
